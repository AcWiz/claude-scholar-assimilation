# Conda 环境配置（miniconda / miniforge 均可使用）
# 使用方法：
#   conda env create -f environment.yml
#   conda activate research-project
name: research-project
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python>=3.10
  - pytorch>=2.0.0
  - torchvision
  - torchaudio
  - numpy>=1.24.0
  - pandas>=2.0.0
  - scipy>=1.10.0
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - scikit-learn>=1.3.0
  - pip
  - pip:
      - transformers>=4.30.0
      - datasets>=2.14.0
      - hydra-core>=1.3.0
      - omegaconf>=2.3.0
      - wandb>=0.15.0
